name: Bug report
description: Report something broken in Tra Đá Mentor Hub
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Auth / login
        - Mentors / mentees / CRM
        - Scheduling / slots
        - Admin / notifications
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit (optional)
      placeholder: v1.1.0 or git SHA
