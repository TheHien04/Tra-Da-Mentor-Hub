name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure secrets are not tracked in git
        run: npm run check:secrets

      - name: Typecheck and build frontend
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Verify production env script
        run: |
          export NODE_ENV=production
          export JWT_SECRET=ci-jwt-secret-minimum-sixty-four-characters-long-for-github-actions
          export JWT_REFRESH_SECRET=ci-jwt-refresh-secret-minimum-sixty-four-characters-long-for-ci
          export DATABASE_URL=mongodb://127.0.0.1:27017/tra-da-mentor-ci
          export CORS_ORIGIN=http://localhost:5000
          npm run build
          npm run verify:env

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      NODE_ENV: test
      DATABASE_URL: mongodb://127.0.0.1:27017/tra-da-mentor-ci
      JWT_SECRET: ci-jwt-secret-minimum-sixty-four-characters-long-for-github-actions
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-minimum-sixty-four-characters-long-for-ci
      CORS_ORIGIN: http://localhost:5173
      ENABLE_DEMO_AUTH: 'true'
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
