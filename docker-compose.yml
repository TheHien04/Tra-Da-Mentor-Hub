# Local production simulation: docker compose up --build
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: mongodb://mongo:27017/tra-da-mentor
      JWT_SECRET: ${JWT_SECRET:-change-me-use-openssl-rand-hex-64-for-real-deployments-only}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-openssl-rand-hex-64-minimum}
      CORS_ORIGIN: http://localhost:5000
      FRONTEND_URL: http://localhost:5000
      BASE_URL: http://localhost:5000
      ENABLE_DEMO_AUTH: "true"
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
